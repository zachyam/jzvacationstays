<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Picker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
      body {
        font-family: 'Outfit', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      iconify-icon {
        stroke-width: 1.5;
      }
    </style>
  </head>
  <body class="bg-stone-50 text-stone-900 p-8 sm:p-24 min-h-screen flex justify-center items-start">
    <!-- Date Picker Dropdown -->
    <div class="relative group">
      <button class="flex items-center gap-3 bg-white border border-stone-200 px-4 py-2.5 rounded-xl shadow-sm hover:border-stone-300 transition-all text-stone-900 font-medium focus:ring-2 focus:ring-sky-500/20 focus:outline-none">
        <iconify-icon icon="solar:calendar-linear" class="text-stone-400 text-lg"></iconify-icon>
        <span>Jan 10, 2028</span>
        <iconify-icon icon="solar:arrow-right-linear" class="text-stone-400 text-lg"></iconify-icon>
        <span>Jan 24, 2028</span>
      </button>

      <!-- Calendar Popover Panel -->
      <div class="absolute top-full left-0 mt-3 w-[21.25rem] bg-white border border-stone-200 rounded-[1.5rem] p-6 shadow-2xl shadow-stone-200/50">
        <!-- Header -->
        <div class="grid grid-cols-3 items-center mb-5 px-1">
          <div class="justify-self-start">
            <button class="text-sm text-stone-500 hover:text-stone-900 transition-colors font-medium">
              Today
            </button>
          </div>
          <div class="justify-self-center">
            <span class="text-xl font-medium tracking-tight text-stone-900 whitespace-nowrap">
              January 2028
            </span>
          </div>
          <div class="flex items-center gap-3 justify-self-end text-stone-500">
            <button class="hover:text-stone-900 transition-colors flex items-center justify-center p-1">
              <iconify-icon icon="solar:alt-arrow-left-linear" class="text-xl"></iconify-icon>
            </button>
            <button class="hover:text-stone-900 transition-colors flex items-center justify-center p-1">
              <iconify-icon icon="solar:alt-arrow-right-linear" class="text-xl"></iconify-icon>
            </button>
          </div>
        </div>

        <!-- Divider -->
        <div class="h-px w-full bg-stone-200 mb-5"></div>

        <!-- Days of Week -->
        <div class="grid grid-cols-7 mb-3 text-center">
          <span class="text-sm font-medium text-stone-500">Sun</span>
          <span class="text-sm font-medium text-stone-500">Mon</span>
          <span class="text-sm font-medium text-stone-500">Tue</span>
          <span class="text-sm font-medium text-stone-500">Wed</span>
          <span class="text-sm font-medium text-stone-500">Thu</span>
          <span class="text-sm font-medium text-stone-500">Fri</span>
          <span class="text-sm font-medium text-stone-500">Sat</span>
        </div>

        <!-- Dates Grid -->
        <div class="grid grid-cols-7 gap-y-2 text-center">
          <!-- Week 1 -->
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-400 hover:bg-stone-100 hover:text-stone-900 transition-colors">
            30
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-400 hover:bg-stone-100 hover:text-stone-900 transition-colors">
            31
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            1
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            2
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            3
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            4
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            5
          </button>

          <!-- Week 2 -->
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            6
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            7
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            8
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            9
          </button>
          <!-- Selected Date -->
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full bg-sky-500 text-white font-medium text-base shadow-md hover:bg-sky-400 transition-colors">
            10
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            11
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            12
          </button>

          <!-- Week 3 -->
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            13
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            14
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            15
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            16
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            17
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            18
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            19
          </button>

          <!-- Week 4 -->
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            20
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            21
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            22
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            23
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            24
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            25
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            26
          </button>

          <!-- Week 5 -->
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            27
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            28
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            29
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-900 hover:bg-stone-100 transition-colors">
            30
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-400 hover:bg-stone-100 hover:text-stone-900 transition-colors">
            1
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-400 hover:bg-stone-100 hover:text-stone-900 transition-colors">
            2
          </button>
          <button class="w-10 h-10 mx-auto flex items-center justify-center rounded-full text-base font-medium text-stone-400 hover:bg-stone-100 hover:text-stone-900 transition-colors">
            3
          </button>
        </div>
      </div>
    </div>
  
</body></html>
